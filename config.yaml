    releases:
        enabled: false
    rhcc-survey:
        enabled: false
    test-cluster:
        enabled: false
    update-banner-job:
        enabled: false
    update-py2-db:
        enabled: false
    update-ro-keys-job:
        enabled: false
    zlog:
        enabled: false
allowed_remote_resources:
    - https://raw.githubusercontent.com/fullsend-ai/fullsend/
