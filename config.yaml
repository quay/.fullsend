# fullsend organization configuration
# https://github.com/fullsend-ai/fullsend
#
# This file is managed by fullsend. Manual edits may be overwritten.
version: "1"
dispatch:
    platform: github-actions
    mode: oidc-mint
inference:
    provider: vertex
defaults:
    roles:
        - fullsend
        - triage
        - coder
        - review
        - retro
        - prioritize
    max_implementation_retries: 2
    auto_merge: false
agents:
    - role: fullsend
      name: fullsend-ai-fullsend
      slug: fullsend-ai-fullsend
    - role: triage
      name: fullsend-ai-triage
      slug: fullsend-ai-triage
    - role: coder
      name: fullsend-ai-coder
      slug: fullsend-ai-coder
    - role: review
      name: fullsend-ai-review
      slug: fullsend-ai-review
    - role: retro
      name: fullsend-ai-retro
      slug: fullsend-ai-retro
    - role: prioritize
      name: fullsend-ai-prioritize
      slug: fullsend-ai-prioritize
repos:
    .fullsend:
        enabled: false
    .github:
        enabled: false
    ai-helpers:
        enabled: false
    bastion:
        enabled: false
    clair:
        enabled: false
    clair-action:
        enabled: false
    clair-enrichment-spec:
        enabled: false
    clair-fixtures:
        enabled: false
    clair-jwt:
        enabled: false
    clair-load-test:
        enabled: false
    clair-notification-spec:
        enabled: false
    clair-operator:
        enabled: false
    clair-workflows:
        enabled: false
    clair-workspace:
        enabled: false
    claircore:
        enabled: false
    claircore-acceptance:
        enabled: false
    community:
        enabled: false
    container-security-operator:
        enabled: false
    dba-operator:
        enabled: false
    dora:
        enabled: false
    enhancements:
        enabled: false
    jwtproxy:
        enabled: false
    limits:
        enabled: false
    mirror-registry:
        enabled: false
    opensearch-dashboards:
        enabled: false
    quay:
        enabled: false
    quay-bridge-operator:
        enabled: false
    quay-builder:
        enabled: false
    quay-builder-qemu:
        enabled: false
    quay-ci-app:
        enabled: false
    quay-cloudflare-cdn-worker:
        enabled: false
    quay-docs:
        enabled: false
    quay-mcp-server:
        enabled: false
    quay-operator:
        enabled: false
    quay-osbs:
        enabled: false
    quay-packages:
