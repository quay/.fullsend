# fullsend organization configuration
# https://github.com/fullsend-ai/fullsend
#
# This file is managed by fullsend. Manual edits may be overwritten.
version: "1"
dispatch:
    platform: github-actions
    mode: oidc-mint
inference:
    provider: vertex
defaults:
    roles:
        - fullsend
        - triage
        - coder
        - review
        - retro
        - prioritize
    max_implementation_retries: 2
    auto_merge: false
agents:
    - role: fullsend
      name: fullsend-ai-fullsend
      slug: fullsend-ai-fullsend
    - role: triage
      name: fullsend-ai-triage
      slug: fullsend-ai-triage
    - role: coder
      name: fullsend-ai-coder
      slug: fullsend-ai-coder
    - role: review
      name: fullsend-ai-review
      slug: fullsend-ai-review
    - role: retro
      name: fullsend-ai-retro
      slug: fullsend-ai-retro
    - role: prioritize
      name: fullsend-ai-prioritize
      slug: fullsend-ai-prioritize
repos:
    .fullsend:
        enabled: true
    ai-helpers:
        enabled: true
    quay-operator:
        enabled: true
    quay-konflux:
        enabled: true
    quay-konflux-configs:
        enabled: true
    quay-fbcs:
        enabled: true
    quay-konflux-components:
        enabled: true
    quay:
        enabled: true
allowed_remote_resources:
    - https://raw.githubusercontent.com/fullsend-ai/fullsend/
