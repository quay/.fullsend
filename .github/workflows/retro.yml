# Upstream: https://github.com/fullsend-ai/fullsend/blob/main/internal/scaffold/fullsend-repo/.github/workflows/retro.yml
---
# fullsend-stage: retro
name: Retro

permissions:
  actions: write
  contents: read
  id-token: write
  issues: write

on:
  workflow_dispatch:
    inputs:
      event_type:
        required: true
        type: string
      source_repo:
        required: true
        type: string
      event_payload:
        required: true
        type: string

concurrency:
  group: fullsend-retro-${{ inputs.source_repo }}-${{ fromJSON(inputs.event_payload).pull_request.number || fromJSON(inputs.event_payload).issue.number }}
  cancel-in-progress: true

jobs:
  debounce:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - run: sleep 60

  retro:
    needs: debounce
    uses: fullsend-ai/fullsend/.github/workflows/reusable-retro.yml@v0
    with:
      event_type: ${{ inputs.event_type }}
      source_repo: ${{ inputs.source_repo }}
      event_payload: ${{ inputs.event_payload }}
      mint_url: ${{ vars.FULLSEND_MINT_URL }}
      gcp_region: ${{ vars.FULLSEND_GCP_REGION }}
      fullsend_ai_ref: v0
    secrets:
      FULLSEND_GCP_WIF_PROVIDER: ${{ secrets.FULLSEND_GCP_WIF_PROVIDER }}
      FULLSEND_GCP_PROJECT_ID: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}
